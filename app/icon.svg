<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a2e1a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </radialGradient>
    <radialGradient id="center" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#059669"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Spring petal — top, pink -->
  <ellipse cx="16" cy="9" rx="3.8" ry="6.2" fill="#f0abfc" opacity="0.88"/>

  <!-- Summer petal — right, gold -->
  <ellipse cx="23" cy="16" rx="6.2" ry="3.8" fill="#fde68a" opacity="0.88"/>

  <!-- Autumn petal — bottom, amber -->
  <ellipse cx="16" cy="23" rx="3.8" ry="6.2" fill="#fb923c" opacity="0.88"/>

  <!-- Winter petal — left, ice blue -->
  <ellipse cx="9" cy="16" rx="6.2" ry="3.8" fill="#bae6fd" opacity="0.88"/>

  <!-- Center gem -->
  <circle cx="16" cy="16" r="5.2" fill="#064e3b"/>
  <circle cx="16" cy="16" r="3.8" fill="url(#center)" filter="url(#glow)"/>
  <circle cx="14.8" cy="14.8" r="1.1" fill="#d1fae5" opacity="0.55"/>
</svg>
